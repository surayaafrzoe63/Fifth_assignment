<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Issues Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>
</head>

<body class="bg-base-300 min-h-screen flex items-center justify-center">
  <section class=" w-3/12 py-9 bg-white mt-2 shadow mx-auto rounded-xl">
    <div class=" mx-auto pt-8">
      <img class="logo w-[85px] mx-auto" src="assets/github-logo.png" alt="">
    </div>
    <div class=" w-[300px] mx-auto pt-6 text-center">
      <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
      <P class="text-[16px] text-[#64748B]">Sign in to manage your issues</P>
    </div>

    <div class="form pt-8 ">
      <div class="card bg-base-100 w-full rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label">Username</label>
            <input id="input-name" type="text" class="input rounded-4xl w-full" placeholder="Enter Username" />
            <label class="label ">Password</label>
            <input id="input-pin" type="password" class="input rounded-4xl w-full" placeholder="Enter Password" />
            <button id="login-btn" class="btn btn-primary mt-4 rounded-4xl w-full">Sign In</button>
          </fieldset>
        </div>
      </div>
    </div>

    <div class="items-center flex justify-center"><p class="text-[#64748B]">Demo Credentials:</p></div>
    <div class=" bg-[#F8FAFC] items-center flex justify-center  p-4 m-2.5">
      <p>
       <span class="font-bold">Username:</span>  admin
        <br>
        <span class="font-bold">Password:</span> admin123
      </p>
    </div>

  </section>
  <script src="scripts/login.js">

  </script>



</body>

</html>
